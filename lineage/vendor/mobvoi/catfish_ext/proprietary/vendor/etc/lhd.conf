PortName=tcp:127.0.0.1:300
LheName=bbd

GpioNStdbyPath=/sys/class/gpio/gpio74/value

#LhePatch=/system/etc/SensorHub.patch
LhePatch=/vendor/etc/SensorHub.patch
LheBbdPacket=/dev/ttyBCM
LheBbdControl=/dev/bbd_control
LheBbdSensor=/dev/bbd_sensor

# For developement stage, we need to set this on.
# For production stage, we should set this off.
# LheFailSafe=ON
# LheFailSafe=BINFILE=/data/system/gps/esw-crash-dump.bin
# LheFailSafe=LOG
Lhe477xDebugFlags=RPC:FACILITY=65535:LOG_INFO

LheConsole=/data/system/gps/LheConsole
Log=FILE
LogDirectory=/data/system/gps/log/lhd
NvStorageDir=/data/system/gps/
#Lhe477xDebugFlags=FACILITY=65535-dKP+CUST+LHE:LOG_DEBUG
#LheConsole=/data/system/gps/LheConsole

LogEnabled=false

TrafficLogEnabled=false

# Save the fail-safe logging to the normal lhd log file:
# LheFailSafe=LOG
# LheFailSafe=FILE=/data/system/gps/esw-crash-dump.txt
LheRsmResetTimeoutMS=25000

